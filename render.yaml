# Render Blueprint for the Crucible Mission Control backend.
#
# Deploys the FastAPI loop server as a Docker web service. With no Spider/BIRD
# data configured, the server runs the REAL loop on the bundled "world" database
# (real schema + human-authored gold SQL), driven by live Gemini 3 and tracing to
# Arize Phoenix. The frontend is deployed separately (Vercel) and points at this
# service's URL via VITE_API_URL.
services:
  - type: web
    name: crucible-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      # --- Demo mode -----------------------------------------------------------
      # When set, /run streams the REAL optimization loop (real SQL, real scores)
      # with a deterministic model standing in for Gemini, so the hosted UI always
      # shows a working 50%->100% climb without a funded LLM. Set to "0" once a
      # funded Gemini key is in place to run fully live.
      - key: CRUCIBLE_DEMO
        value: "1"

      # --- Model ---------------------------------------------------------------
      - key: GEMINI_MODEL
        # Free-tier-safe Gemini 3 id. gemini-3-pro-preview needs billing.
        value: gemini-3-flash-preview

      # --- Live-run bound ------------------------------------------------------
      # Caps the optimization iterations for LIVE catalog databases (concert_singer,
      # university, ecommerce) so a hosted run can't loop endlessly and burn Gemini
      # quota. The deterministic "world" demo ignores this. Default is 3.
      - key: CRUCIBLE_MAX_ITERS
        value: "3"

      # --- Gemini credentials (Vertex AI — draws the Cloud trial credits) ------
      # The "live" catalog DBs use Vertex AI. Paste the service-account key JSON
      # into GOOGLE_SA_JSON in the dashboard (sync:false); the app writes it to a
      # file at boot and points ADC at it. gemini-3-flash-preview is served from
      # the `global` location on Vertex.
      - key: GOOGLE_GENAI_USE_VERTEXAI
        value: "true"
      - key: GOOGLE_CLOUD_PROJECT
        value: gen-lang-client-0589427141
      - key: GOOGLE_CLOUD_LOCATION
        value: global
      - key: GOOGLE_SA_JSON
        sync: false
      # AI Studio fallback (unused while Vertex is on); kept for convenience.
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_API_KEYS
        sync: false

      # --- Arize Phoenix -------------------------------------------------------
      - key: PHOENIX_PROJECT_NAME
        value: crucible
      - key: PHOENIX_API_KEY
        sync: false
      - key: PHOENIX_COLLECTOR_ENDPOINT
        sync: false
